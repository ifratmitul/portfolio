<div class="fixed top-0 right-0 w-11/12 -z-10 translate-y-[-80%] dark:hidden">
    <img src="assets/images/header-bg-color.png" alt="" class="w-full" />
</div>

<nav id="navbar"
     [ngClass]="{
       'bg-white/50 backdrop-blur-lg shadow-sm': isScrolled && !isDarkMode,
       'bg-darkTheme shadow-white/20': isScrolled && isDarkMode
     }"
     class="w-full fixed px-5 lg:px-8 xl:px-[8%] py-4 flex items-center justify-between z-50">

    <a href="#top">
        <img src="assets/images/logo.png" alt="Logo" class="w-28 cursor-pointer mr-14 dark:hidden" />
        <img src="assets/images/logo_dark.png" alt="Logo" class="w-28 cursor-pointer mr-14 hidden dark:block" />
    </a>

    <ul id="navLink"
        [ngClass]="{
          'bg-white/50 shadow-sm': !isScrolled && !isDarkMode,
          'border border-white/30 bg-transparent': !isScrolled && isDarkMode
        }"
        class="hidden md:flex items-center gap-6 lg:gap-8 rounded-full px-12 py-3 font-Ovo">
        <li><a class='hover:text-gray-500 dark:hover:text-gray-300 transition' href="#top">Home</a></li>
        <li><a class='hover:text-gray-500 dark:hover:text-gray-300 transition' href="#about">About me</a></li>
        <li><a class='hover:text-gray-500 dark:hover:text-gray-300 transition' href="#services">Services</a></li>
        <li><a class='hover:text-gray-500 dark:hover:text-gray-300 transition' href="#work">My Work</a></li>
        <li><a class='hover:text-gray-500 dark:hover:text-gray-300 transition' href="#contact">Contact me</a></li>
    </ul>

    <div class="flex items-center gap-4">
        <button (click)="toggleTheme()">
            <img src="assets/images/moon_icon.png" alt="" class="w-5 dark:hidden" />
            <img src="assets/images/sun_icon.png" alt="" class="w-5 hidden dark:block" />
        </button>

        <a href="#contact"
            class="hidden lg:flex items-center gap-3 px-8 py-1.5 border border-gray-300 hover:bg-slate-100/70 dark:hover:bg-darkHover rounded-full ml-4 font-Ovo dark:border-white/30">
            Contact
            <img src="assets/images/arrow-icon.png" alt="" class="w-3 dark:hidden" />
            <img src="assets/images/arrow-icon-dark.png" alt="" class="w-3 hidden dark:block" />
        </a>

        <button class="block md:hidden ml-3" (click)="openMenu()">
            <img src="assets/images/menu-black.png" alt="" class="w-6 dark:hidden" />
            <img src="assets/images/menu-white.png" alt="" class="w-6 hidden dark:block" />
        </button>
    </div>

    <!-- Mobile menu -->
    <ul id="mobileMenu"
        [ngClass]="{
          '-right-64': !isMobileMenuOpen,
          'right-0': isMobileMenuOpen
        }"
        class="flex md:hidden flex-col gap-4 py-20 px-10 fixed top-0 bottom-0 w-64 z-50 h-screen bg-rose-50 transition duration-500 font-Ovo dark:bg-darkHover dark:text-white">

        <div class="absolute right-6 top-6" (click)="closeMenu()">
            <img src="assets/images/close-black.png" alt="" class="w-5 cursor-pointer dark:hidden" />
            <img src="assets/images/close-white.png" alt="" class="w-5 cursor-pointer hidden dark:block" />
        </div>

        <li><a href="#top" (click)="closeMenu()">Home</a></li>
        <li><a href="#about" (click)="closeMenu()">About me</a></li>
        <li><a href="#services" (click)="closeMenu()">Services</a></li>
        <li><a href="#work" (click)="closeMenu()">My Work</a></li>
        <li><a href="#contact" (click)="closeMenu()">Contact me</a></li>
    </ul>
</nav>
