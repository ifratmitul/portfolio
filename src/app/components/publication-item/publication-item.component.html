<div class="border border-gray-300 dark:border-white/30 rounded-xl px-5 py-3 sm:px-6 sm:py-4
            hover:bg-lightHover hover:-translate-y-1 duration-500
            hover:shadow-black dark:hover:shadow-white/80 dark:hover:bg-darkHover/50">

    <div class="flex flex-col gap-1">
        <!-- Header: Title & Year Badge -->
        <div class="flex flex-col sm:flex-row sm:items-start sm:justify-between gap-1 sm:gap-2">
            <!-- Title -->
            <a *ngIf="publication.link"
               [href]="publication.link"
               target="_blank"
               class="text-base sm:text-lg font-semibold text-gray-800 dark:text-white font-Ovo
                      hover:text-blue-600 dark:hover:text-blue-400 transition-colors cursor-pointer">
                {{ publication.title }}
            </a>
            <h3 *ngIf="!publication.link"
                class="text-base sm:text-lg font-semibold text-gray-800 dark:text-white font-Ovo">
                {{ publication.title }}
            </h3>

            <!-- Year & Status Badges -->
            <div class="flex items-center gap-2 flex-shrink-0">
                <span class="px-2 py-0.5 text-xs font-medium rounded-full
                             bg-gray-100 text-gray-700
                             dark:bg-white/10 dark:text-white/80
                             border border-gray-200 dark:border-white/20">
                    {{ publication.year }}
                </span>
                <span *ngIf="publication.isPreprint"
                      class="px-2 py-0.5 text-xs font-medium rounded-full
                             bg-yellow-100 text-yellow-700
                             dark:bg-yellow-500/20 dark:text-yellow-300
                             border border-yellow-200 dark:border-yellow-500/30">
                    Preprint
                </span>
                <span *ngIf="!publication.isPreprint"
                      class="px-2 py-0.5 text-xs font-medium rounded-full
                             bg-green-100 text-green-700
                             dark:bg-green-500/20 dark:text-green-300
                             border border-green-200 dark:border-green-500/30">
                    Published
                </span>
            </div>
        </div>

        <!-- Authors -->
        <p class="text-sm text-gray-600 dark:text-white/70">
            {{ publication.authors }}
        </p>

        <!-- Venue & View Paper Link -->
        <div class="flex flex-wrap items-center gap-x-3 gap-y-1">
            <p class="text-sm text-gray-500 dark:text-white/60 italic">
                {{ publication.venue }}
            </p>
            <a *ngIf="publication.link"
               [href]="publication.link"
               target="_blank"
               class="inline-flex items-center gap-1 text-sm text-blue-600 dark:text-blue-400
                      hover:text-blue-800 dark:hover:text-blue-300 transition-colors">
                <i class="fa-solid fa-arrow-up-right-from-square text-xs"></i>
                View Paper
            </a>
        </div>
    </div>
</div>
