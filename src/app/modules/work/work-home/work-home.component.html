 <!-- ----- about me section ------ -->
    <div id="about" class="w-full px-[12%] py-10 scroll-mt-20">

        <div class="flex w-full flex-col lg:flex-row items-center gap-20 my-20">
            <div class="max-w-max mx-auto relative"><img src="/assets/images/Student Headshots-526.jpg" alt=""
                    class="w-64 sm:w-80 rounded-3xl max-w-none">
                <div
                    class="bg-white w-1/2 aspect-square absolute right-0 bottom-0 rounded-full translate-x-1/4 translate-y-1/3 shadow-[0_4px_55px_rgba(149,0,162,0.15)] flex items-center justify-center">
                    <img src="/assets/images/test.png" alt="" class="w-full animate-spin_slow">
                    <!-- <img src="/assets/images/dev-icon.png" alt=""
                        class="w-1/4 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2"> -->
                </div>
            </div>
            <div class="flex-1">
                <h2 class="text text-2xl font-Ovo mb-5">Research Vision</h2>
                <p class="mb-10 max-w-2xl font-Ovo" *ngIf="researchVision" [innerHTML]="researchVision"></p>

                <h4 class="my-6 text-black text-2xl font-Ovo dark:text-white/80">Technical Skills</h4>
                <div class="space-y-4 max-w-2xl" *ngIf="skillCategories.length > 0">
                    <div *ngFor="let category of skillCategories">
                        <h5 class="text-sm font-semibold text-gray-700 dark:text-white/90 mb-2">
                            <i [ngClass]="[category.icon, 'mr-2', category.iconColor]"></i>{{category.title}}
                        </h5>
                        <div class="flex flex-wrap gap-2">
                            <span *ngFor="let tool of category.tools"
                                  class="px-3 py-1 text-xs font-medium rounded-full border"
                                  [ngClass]="category.badgeClasses">
                                {{tool}}
                            </span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <h4 class="text-center mb-2 text-3xl font-Ovo">Experience</h4>
    
        <div class="flex w-full flex-col gap-4 my-8">
             <app-experience-card *ngFor="let exp of experiences" [experience]="exp"></app-experience-card>
        </div>

    </div>
